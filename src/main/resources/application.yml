spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/filetransfer
    username: postgres
    password: Shivam@26
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema; Hibernate just validates
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 50          # Batch inserts (useful for bulk chunk records)
          fetch_size: 100

  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB        # Per chunk — individual chunk ceiling
      max-request-size: 11MB

app:
  storage:
    base-path: C:/filetransfer   # Override via env var in prod
    chunk-dir: chunks
    file-dir: files
  upload:
    chunk-size-bytes: 5242880     # 5 MB per chunk (tunable)
    max-file-size-bytes: 10737418240   # 10 GB max file size
    chunk-ttl-hours: 24           # Orphaned chunks are cleaned after 24h
  share:
    default-expiry-hours: 72
    code-length: 8
  async:
    merge-pool-size: 4            # Threads available for concurrent merge operations
    chunk-pool-size: 8

logging:
  level:
    com.filetransfer: DEBUG
    org.springframework.web: INFO